<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشغيل: {{ video.title }}</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #f4f4f9; color: #333; margin: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #007bff; margin-bottom: 20px; }
        video { width: 100%; max-height: 70vh; background-color: #000; border-radius: 8px; }
        .back-link { display: block; margin-top: 20px; color: #dc3545; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تشغيل: {{ video.title }}</h1>
        <video id="videoPlayer" controls autoplay preload="auto">
            <source src="{{ url_for('stream', video_id=video.id) }}" type="video/mp4">
            متصفحك لا يدعم وسم الفيديو.
        </video>

        <a href="{{ url_for('index') }}" class="back-link">العودة إلى القائمة الرئيسية</a>
    </div>
</body>
</html>
