<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تخطي روابط OUO</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            direction: ltr;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e2f0d9;
            color: #2e7d32;
            border-radius: 5px;
            border: 1px solid #c8e6c9;
            word-break: break-all;
        }
        .error {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffebee;
            color: #c62828;
            border-radius: 5px;
            border: 1px solid #ffcdd2;
        }
        a.direct-link {
            display: inline-block;
            margin-top: 10px;
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>أداة تخطي روابط OUO</h2>
    <form method="POST">
        <input type="text" name="url" placeholder="أدخل رابط ouo.io أو ouo.press هنا..." required>
        <br>
        <button type="submit">تخطي الرابط</button>
    </form>

    {% if result %}
        <div class="result">
            <strong>تم التخطي بنجاح!</strong><br>
            <a href="{{ result }}" class="direct-link" target="_blank">{{ result }}</a>
        </div>
    {% endif %}

    {% if error %}
        <div class="error">
            <strong>خطأ:</strong> {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
